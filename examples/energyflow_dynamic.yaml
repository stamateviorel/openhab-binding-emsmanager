# energyflow_dynamic — SITE-SPECIFIC reference (NOT the generic marketplace widget)
#
# This is the live energy-flow widget from the production /etc/openhab install. Unlike the
# generic ./widgets/energy_flow/ widget (which renders consumers/generators dynamically from
# openHAB Group items via oh-repeater), this version renders each consumer + the sun as FIXED
# elements hardcoded to this site's items (EMS_DM_Airco_W, EMS_DM_Cars_W, Solar_PV_W, ...).
# Trade-off: it ONLY works on this install, but the fixed elements never flake (no oh-repeater
# that can render empty after a restart) and positions are pinned so labels can't overlap.
# Kept here as a reference for the fixed-element layout approach. For reuse, start from
# ../widgets/energy_flow/energy_flow.yaml and swap the item names.
#
uid: energyflow_dynamic
tags:
- energy
- dashboard
- flow
props:
  parameterGroups:
  - name: producers
    label: Bronnen / opwekkers
  - name: consumers
    label: Verbruikers
  - name: tuning
    label: Conventies & schaling
  parameters:
  - name: name
    label: Title
    type: TEXT
    default: Energie & Klimaat
  - name: generatorGroup
    label: Generators group (PV/genset)
    type: TEXT
    context: item
    groupName: producers
    default: g_energyflow_generators
  - name: gridItem
    label: Grid power
    type: TEXT
    context: item
    groupName: producers
    default: Grid_load
  - name: batteryItem
    label: Battery power
    type: TEXT
    context: item
    groupName: producers
    default: Battery_load
  - name: batterySocItem
    label: Battery SoC % item
    type: TEXT
    context: item
    groupName: producers
    default: Battery_percentage
  - name: houseItem
    label: Building consumption (total)
    type: TEXT
    context: item
    groupName: producers
    default: House_load_sum
  - name: consumerGroup
    label: Consumers group
    type: TEXT
    context: item
    groupName: consumers
    default: g_energyflow_consumers
  - name: powerDivisor
    label: Producer item -> kW divisor (W=1000)
    type: DECIMAL
    groupName: tuning
    default: 1000
  - name: consumerDivisor
    label: Consumer item -> kW divisor (W=1000)
    type: DECIMAL
    groupName: tuning
    default: 1000
  - name: gridExportPositive
    label: 'Grid sign: positive = EXPORT'
    type: BOOLEAN
    groupName: tuning
    default: true
  - name: batteryChargePositive
    label: 'Battery sign: positive = CHARGING'
    type: BOOLEAN
    groupName: tuning
    default: true
