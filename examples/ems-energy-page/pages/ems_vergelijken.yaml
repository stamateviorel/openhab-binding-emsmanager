uid: ems_vergelijken
tags:
- ems
props:
  parameters: []
timestamp: Jun 1, 2026, 9:10:00 AM
component: oh-chart-page
config:
  label: Compare
  sidebar: false
  chartType: day
  period: D
slots:
  grid:
  - component: oh-chart-grid
    config:
      includeLabels: true
      top: 10%
      height: 40%
      left: 13%
      right: 5%
  - component: oh-chart-grid
    config:
      includeLabels: true
      top: 64%
      height: 26%
      left: 13%
      right: 5%
  xAxis:
  - component: oh-category-axis
    config:
      gridIndex: 0
      categoryType: hour
      name: hour
  - component: oh-category-axis
    config:
      gridIndex: 1
      categoryType: hour
      name: hour
  yAxis:
  - component: oh-value-axis
    config:
      gridIndex: 0
      name: 'W  (Grid: + feed-in / − draw)'
  - component: oh-value-axis
    config:
      gridIndex: 1
      name: '% SoC'
      min: 0
      max: 100
  series:
  - component: oh-aggregate-series
    config:
      name: Production (solar+battery)
      item: Solar_load
      service: influxdb
      type: line
      dimension1: hour
      aggregationFunction: average
      gridIndex: 0
      xAxisIndex: 0
      yAxisIndex: 0
      itemColor: '#fbc02d'
      itemStyle:
        color: '#fbc02d'
  - component: oh-aggregate-series
    config:
      name: Consumption
      item: House_load_sum
      service: influxdb
      type: line
      dimension1: hour
      aggregationFunction: average
      gridIndex: 0
      xAxisIndex: 0
      yAxisIndex: 0
      itemColor: '#4a90d9'
      itemStyle:
        color: '#4a90d9'
  - component: oh-aggregate-series
    config:
      name: Grid
      item: Grid_load
      service: influxdb
      type: bar
      dimension1: hour
      aggregationFunction: average
      gridIndex: 0
      xAxisIndex: 0
      yAxisIndex: 0
      itemColor: '#ab47bc'
      itemStyle:
        color: '#ab47bc'
  - component: oh-aggregate-series
    config:
      name: Battery SoC
      item: Battery_percentage
      service: influxdb
      type: line
      dimension1: hour
      aggregationFunction: average
      gridIndex: 1
      xAxisIndex: 1
      yAxisIndex: 1
      itemColor: '#2a8c5a'
      itemStyle:
        color: '#2a8c5a'
      areaStyle:
        opacity: 0.18
  legend:
  - component: oh-chart-legend
    config:
      show: true
      bottom: 3
  tooltip:
  - component: oh-chart-tooltip
    config:
      trigger: axis
  dataZoom:
  - component: oh-chart-datazoom
    config:
      type: inside
      xAxisIndex:
      - 0
      - 1
