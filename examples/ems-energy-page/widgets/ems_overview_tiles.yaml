uid: ems_overview_tiles
tags:
- ems
timestamp: Jun 1, 2026, 9:30:00 AM
component: f7-block
config:
  style:
    padding: 6px
    margin: '0'
  stylesheet: "  .ovw { padding: 3px; font-family: var(--f7-font-family); color: var(--f7-text-color); }\n  .period { margin-bottom: 9px; }\n  .card { background: var(--f7-card-bg-color,#fff); border: 1px solid rgba(127,127,127,0.13); border-radius: 15px; padding: 11px 13px; box-shadow: 0 2px 10px rgba(127,127,127,0.09); margin-bottom: 9px; }\n  .card-h { display: flex; align-items: baseline; font-size: 12px; font-weight: 700; margin-bottom: 8px; color: #8a9099; text-transform: uppercase; letter-spacing: .04em; }\n  .card-h-r { margin-left: auto; font-size: 11px; color: #9aa0a0; font-weight: 500; text-transform: none; letter-spacing: 0; }\n  .flowbox { position: relative; height: 156px; }\n  .flowbox svg { position: absolute; inset: 0; width: 100%; height: 100%; }\n  .fldot { fill: none; stroke-linecap: round; vector-effect: non-scaling-stroke; stroke-width: 2.5; stroke-dasharray: 1 13; animation: march 1.4s linear infinite; }\n  @keyframes march { to { stroke-dashoffset: -14; } }\n  .slabel { position: absolute; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; z-index: 3; transition: top .5s ease, opacity .4s ease; background: var(--f7-card-bg-color, #fff); border-radius: 11px; padding: 3px 9px 3px 4px; box-shadow: 0 1px 7px rgba(0,0,0,0.22); }\n  .s-left { left: 6px; }\n  .s-right { right: 6px; flex-direction: row-reverse; }\n  .s-right .sl-txt { text-align: right; }\n  .sl-ic { width: 26px; height: 26px; border-radius: 9px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); flex-shrink: 0; }\n  .sl-txt .nm { font-size: 9px; color: #9aa0a0; text-transform: uppercase; letter-spacing: .03em; }\n  .sl-txt .v { font-size: 13px; font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; line-height: 1.1; }\n  .gauges { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 9px; }\n  .gauge { background: var(--f7-card-bg-color,#fff); border: 1px solid rgba(127,127,127,0.13); border-radius: 15px; padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 5px; box-shadow: 0 2px 10px rgba(127,127,127,0.09); }\n  .g-ring { position: relative; width: 66px; height: 66px; }\n  .g-arc { width: 66px; height: 66px; border-radius: 50%; -webkit-mask: radial-gradient(transparent 60%, #000 62%); mask: radial-gradient(transparent 60%, #000 62%); transition: background .6s ease; }\n  .g-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }\n  .g-pct { font-size: 16px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }\n  .g-lbl { font-size: 10px; color: #8a9099; text-align: center; }\n  .dv-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; }\n  .dv-name { font-size: 12px; width: 76px; flex-shrink: 0; }\n  .dv-track { flex: 1; height: 8px; border-radius: 4px; background: rgba(127,127,127,0.12); overflow: hidden; }\n  .dv-fill { height: 100%; border-radius: 4px; transition: width .7s cubic-bezier(.2,.8,.2,1); }\n  .dv-kwh { width: 38px; text-align: right; font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; color: #8a9099; }\n"
