  stylesheet: "  .pg { padding: 6px; font-family: var(--f7-font-family); color: var(--f7-text-color); }\n  .card { background: var(--f7-card-bg-color,#fff); border: 1px solid rgba(127,127,127,0.13); border-radius: 15px; padding: 13px 15px; box-shadow: 0 2px 10px rgba(127,127,127,0.09); margin-bottom: 10px; }\n  .ch { font-size: 12px; font-weight: 700; color: #8a9099; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 11px; }\n  .big { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }\n  .bigsub { font-size: 12px; color: #9aa0a0; margin-top: 4px; }\n  .tiles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 9px; margin-top: 12px; }\n  .tile { background: rgba(127,127,127,0.06); border-radius: 12px; padding: 10px 12px; display: flex; flex-direction: column; gap: 3px; }\n  .tile .tv { font-size: 19px; font-weight: 800; font-variant-numeric: tabular-nums; }\n  .tile .tl { font-size: 11px; color: #9aa0a0; }\n  .bar { height: 12px; border-radius: 6px; background: rgba(127,127,127,0.12); overflow: hidden; margin-top: 13px; }\n  .bar > div { height: 100%; border-radius: 6px; transition: width .6s cubic-bezier(.2,.8,.2,1); }\n  .stat { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid rgba(127,127,127,0.08); font-size: 13px; }\n  .stat:last-child { border-bottom: none; }\n  .stat .sn { color: #8a9099; }\n  .stat .sv { margin-left: auto; font-weight: 700; font-variant-numeric: tabular-nums; }\n  .srow { display: flex; align-items: center; padding: 9px 0; border-bottom: 1px solid rgba(127,127,127,0.08); }\n  .srow:last-child { border-bottom: none; }\n  .srow .sl { font-size: 13px; }\n  .srow > :last-child { margin-left: auto; }\n  .pl { display: flex; gap: 2px; height: 16px; margin-top: 4px; }\n  .pl > div { flex: 1; border-radius: 2px; }\n  .legend { display: flex; gap: 14px; margin-top: 8px; font-size: 11px; color: #9aa0a0; }\n  .lg { display: flex; align-items: center; gap: 5px; }\n  .lg > div { width: 9px; height: 9px; border-radius: 3px; }\n  .statusline { font-size: 12.5px; color: #8a9099; margin-top: 11px; }\n"
