thing-type.emsmanager.charger.label = EV charger
thing-type.emsmanager.charger.description = Per-charger config for the EV coordinator + charging plan. Bind the items the coordinator reads (mode/cable/status/amps/power) and writes (current-limit/pause/charging). When any charger Thing exists it replaces the bridge car%d-pattern config.
thing-type.config.emsmanager.charger.name.label = Display name
thing-type.config.emsmanager.charger.carKey.label = Snapshot key
thing-type.config.emsmanager.charger.carKey.description = Defaults to the Thing id. Controllers key per-car state on this.
thing-type.config.emsmanager.charger.modeItem.label = Mode item (ECO/SNEL/OFF)
thing-type.config.emsmanager.charger.cableItem.label = Cable-connected item (ON/OFF)
thing-type.config.emsmanager.charger.statusItem.label = OCPP status item
thing-type.config.emsmanager.charger.powerOcppItem.label = Power item (OCPP, W)
thing-type.config.emsmanager.charger.powerKwItem.label = Power item (clamp, kW)
thing-type.config.emsmanager.charger.ampsL1Item.label = Amps L1 item
thing-type.config.emsmanager.charger.ampsL2Item.label = Amps L2 item
thing-type.config.emsmanager.charger.ampsL3Item.label = Amps L3 item
thing-type.config.emsmanager.charger.currentLimitItem.label = Current-limit item (write, A)
thing-type.config.emsmanager.charger.pauseItem.label = Pause item (write, ON/OFF)
thing-type.config.emsmanager.charger.chargingItem.label = Charging/RemoteStart item (write, ON)
thing-type.config.emsmanager.charger.breakerLimitA.label = Breaker limit (A/phase)

