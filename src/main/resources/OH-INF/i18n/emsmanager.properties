# EMS Manager binding i18n labels (English — default fallback).
# Dutch translations live in emsmanager_nl.properties.

addon.emsmanager.name = EMS Manager Binding
addon.emsmanager.description = Energy management coordinator above the device bindings (KNX, Modbus, OCPP, ...). Priority-scheduled controllers, asset abstraction, forecast / tariff / capacity-tariff support, CO₂ tracking, EV plan, heat-pump SCOP optimizer.

# ============================================================================
# Bridge
# ============================================================================
thing-type.emsmanager.bridge.label = EMS Manager
thing-type.emsmanager.bridge.description = Root coordinator: scheduler + per-tick energy context + per-controller dispatch.

thing-type.config.emsmanager.bridge.tickIntervalSeconds.label = Tick interval (s)
thing-type.config.emsmanager.bridge.tickIntervalSeconds.description = How often the scheduler evaluates controllers.
thing-type.config.emsmanager.bridge.gridSafetyMarginW.label = Grid safety margin (W)
thing-type.config.emsmanager.bridge.gridSafetyMarginW.description = Reserve held export-positive when computing ECO budgets.
thing-type.config.emsmanager.bridge.gridEwmaTauSec.label = Grid EWMA tau (s)
thing-type.config.emsmanager.bridge.gridEwmaTauSec.description = Time constant for the grid-load EWMA smoothing.
thing-type.config.emsmanager.bridge.shadowMode.label = Shadow mode (master)
thing-type.config.emsmanager.bridge.shadowMode.description = When ON, controllers compute but never write setpoints. Master kill-switch.
thing-type.config.emsmanager.bridge.batteryControlMode.label = Battery control mode
thing-type.config.emsmanager.bridge.batteryControlMode.description = auto = EMS writes setpoints to batterySetpointItemName; fixed = user-set static value (BatteryTouDispatcher inert); readonly = inverter not writable (default).
thing-type.config.emsmanager.bridge.batterySetpointItemName.label = Battery setpoint item (auto mode)
thing-type.config.emsmanager.bridge.batterySetpointItemName.description = Item the binding writes to in batteryControlMode=auto. Leave blank in readonly/fixed.
thing-type.config.emsmanager.bridge.batteryFixedSetpointW.label = Fixed setpoint (W, fixed mode)
thing-type.config.emsmanager.bridge.batteryFixedSetpointW.description = Used when batteryControlMode=fixed. Signed: + = discharge, − = charge.
thing-type.config.emsmanager.bridge.batteryMinSetpointW.label = Battery min setpoint (W)
thing-type.config.emsmanager.bridge.batteryMinSetpointW.description = Clamp floor in auto mode. − = max charge from grid.
thing-type.config.emsmanager.bridge.batteryMaxSetpointW.label = Battery max setpoint (W)
thing-type.config.emsmanager.bridge.batteryMaxSetpointW.description = Clamp ceiling in auto mode. + = max discharge.
thing-type.config.emsmanager.bridge.injectionPriceEurPerKWh.label = Injection price (€/kWh)
thing-type.config.emsmanager.bridge.injectionPriceEurPerKWh.description = Price paid for fed-in kWh. Used by CostAnalyticsController.
thing-type.config.emsmanager.bridge.boilerForceOnSchedule.label = Boiler force-on schedule
thing-type.config.emsmanager.bridge.boilerForceOnSchedule.description = CSV of day:HH:MM-HH:MM windows (MON TUE WED THU FRI SAT SUN). Empty = disabled.
thing-type.config.emsmanager.bridge.gridLoadItem.label = Grid load item
thing-type.config.emsmanager.bridge.solarLoadItem.label = Solar load item
thing-type.config.emsmanager.bridge.houseLoadSumItem.label = House load sum item
thing-type.config.emsmanager.bridge.batteryLoadItem.label = Battery load item
thing-type.config.emsmanager.bridge.batteryPercentageItem.label = Battery percentage item
thing-type.config.emsmanager.bridge.batteryReserveTargetItem.label = Battery reserve target item
thing-type.config.emsmanager.bridge.invertGrid.label = Invert grid sign
thing-type.config.emsmanager.bridge.invertGrid.description = Enable if your grid item reports + = import/draw. The binding's canonical convention is + = export/inject; it negates the reading once when this is set.
thing-type.config.emsmanager.bridge.invertSolar.label = Invert solar sign
thing-type.config.emsmanager.bridge.invertSolar.description = Enable if your solar item reports production as a negative value. The binding's canonical convention is + = producing.
thing-type.config.emsmanager.bridge.invertHouse.label = Invert house-load sign
thing-type.config.emsmanager.bridge.invertHouse.description = Enable if your house-load item reports consumption as a negative value. The binding's canonical convention is + = consuming.
thing-type.config.emsmanager.bridge.invertBattery.label = Invert battery sign
thing-type.config.emsmanager.bridge.invertBattery.description = Enable if your battery item reports + = discharging. The binding's canonical convention is + = charging.
thing-type.config.emsmanager.bridge.carCount.label = Number of cars
thing-type.config.emsmanager.bridge.carModeItemPattern.label = Car mode item pattern
thing-type.config.emsmanager.bridge.carCableItemPattern.label = Car cable item pattern
thing-type.config.emsmanager.bridge.carStatusItemPattern.label = Car status item pattern
thing-type.config.emsmanager.bridge.carCurrentLimitItemPattern.label = Car current-limit item pattern
thing-type.config.emsmanager.bridge.carPauseItemPattern.label = Car pause item pattern
thing-type.config.emsmanager.bridge.carChargingItemPattern.label = Car charging item pattern
thing-type.config.emsmanager.bridge.carPowerOcppItemPattern.label = Car OCPP power item pattern (W)
thing-type.config.emsmanager.bridge.carPowerKwItemPattern.label = Car power (kW) item pattern
thing-type.config.emsmanager.bridge.carAmpsL1ItemPattern.label = Car amps L1 item pattern
thing-type.config.emsmanager.bridge.carAmpsL2ItemPattern.label = Car amps L2 item pattern
thing-type.config.emsmanager.bridge.carAmpsL3ItemPattern.label = Car amps L3 item pattern
thing-type.config.emsmanager.bridge.statisticsRollupEnabled.label = Statistics rollup
thing-type.config.emsmanager.bridge.statisticsRollupEnabled.description = Snapshot finalized daily totals into clean EMS_Stat_* items at 23:58 each day, so month/year charts stay fast. Disable only if you don't chart long-range energy.
thing-type.config.emsmanager.bridge.boilerStateItem.label = Boiler state item
thing-type.config.emsmanager.bridge.boilerStateItem.description = Switch item reflecting the boiler's real on/off state (read).
thing-type.config.emsmanager.bridge.aircoGroupItem.label = Air conditioning group item
thing-type.config.emsmanager.bridge.aircoGroupItem.description = Switch/group item reflecting whether air conditioning is drawing power (read).
thing-type.config.emsmanager.bridge.peakShavingEnabledItem.label = Peak shaving enabled item
thing-type.config.emsmanager.bridge.peakShavingEnabledItem.description = Switch item used as the master enable for peak shaving. Missing/UNDEF is treated as enabled.
thing-type.config.emsmanager.bridge.weatherCloudinessItem.label = Weather cloudiness item
thing-type.config.emsmanager.bridge.weatherCloudinessItem.description = Number item with today's forecast cloudiness percentage (read).
thing-type.config.emsmanager.bridge.boilerUserOverrideItem.label = Boiler user override item
thing-type.config.emsmanager.bridge.boilerUserOverrideItem.description = Switch item letting the user force the boiler on, overriding solar/tariff scheduling (read).
thing-type.config.emsmanager.bridge.publishLegacyMirrorItems.label = Publish legacy mirror items
thing-type.config.emsmanager.bridge.publishLegacyMirrorItems.description = Publish the legacy mirror items (PeakShaving_Level/Status/Detail, PeakShaving_EcoCap_A, Available_excess_W, EnergyOrchestrator_Mode, Battery_below_reserve) for pre-existing widgets. Leave off for a fresh install; the binding's own channels carry this data.
thing-type.config.emsmanager.bridge.capacityMinBillableW.label = Capacity tariff minimum billable demand
thing-type.config.emsmanager.bridge.capacityMinBillableW.description = Minimum billable demand for a capacity tariff (Belgium bills a 2500 W minimum). Below this floor there is no point shaving. Set to 0 in markets without a capacity tariff.
thing-type.config.emsmanager.bridge.evEcoSacrosanct.label = ECO charging is sacrosanct
thing-type.config.emsmanager.bridge.evEcoSacrosanct.description = When enabled, the peak/billing shedding controllers (capacity tariff and hard peak-shaving) never pause an EV in ECO mode — they shed the boiler and air-conditioning instead. The hardware breaker-headroom limit still applies. Leave off to shed ECO cars first.
thing-type.config.emsmanager.bridge.boilerDailyTargetKwh.label = DHW daily energy target (kWh)
thing-type.config.emsmanager.bridge.boilerDailyTargetKwh.description = Domestic-hot-water boiler planner: guarantee this many kWh into the boiler each day, solar-first then topping up the gap at the cheapest spot hours before the "ready by" hour. 0 disables the planner.
thing-type.config.emsmanager.bridge.boilerReadyByHour.label = DHW ready-by hour
thing-type.config.emsmanager.bridge.boilerReadyByHour.description = Local hour by which the daily DHW target must be met (e.g. 7 = 07:00). The cheapest-hour top-up runs overnight before this hour.
thing-type.config.emsmanager.bridge.boilerRatedKw.label = Boiler rated power (kW)
thing-type.config.emsmanager.bridge.boilerRatedKw.description = Electrical power the boiler draws when on, used to convert the energy gap into heating hours. Set to your element's rating.
thing-type.config.emsmanager.bridge.boilerPlanShadow.label = DHW planner shadow mode
thing-type.config.emsmanager.bridge.boilerPlanShadow.description = When true, the boiler planner logs its decisions but does not switch the boiler — validate the plan before going live. Set false to let it act.
thing-type.config.emsmanager.bridge.boilerPowerItem.label = Boiler power item (W)
thing-type.config.emsmanager.bridge.boilerPowerItem.description = Optional W power item the planner uses to measure delivered energy accurately. Blank estimates from rated power × on-time.
thing-type.config.emsmanager.bridge.gridCo2GramsPerKWh.label = Grid CO₂ (g/kWh imported)
thing-type.config.emsmanager.bridge.gridCo2GramsPerKWh.description = National grid mix CO₂ intensity. Belgian residential default ≈ 140 g/kWh.
thing-type.config.emsmanager.bridge.injectionCo2OffsetGramsPerKWh.label = Avoided CO₂ on injection (g/kWh)
thing-type.config.emsmanager.bridge.injectionCo2OffsetGramsPerKWh.description = Marginal generation source displaced by your export. Belgian gas-peaker ≈ 350 g/kWh.

# Bridge channels
channel-type.emsmanager.shadowMode.label = Shadow mode (active)
channel-type.emsmanager.shadowMode.description = Live readback of the bridge's shadow-mode state.
channel-type.emsmanager.lastTickAt.label = Last tick at
channel-type.emsmanager.lastTickAt.description = Timestamp of the most recent scheduler tick.
channel-type.emsmanager.tickCount.label = Tick count
channel-type.emsmanager.tickCount.description = Number of scheduler ticks since bridge initialization (liveness indicator).
channel-type.emsmanager.controllerCount.label = Controllers registered
channel-type.emsmanager.controllerCount.description = How many controllers are currently registered with the scheduler.
channel-type.emsmanager.gridLoadRawW.label = Grid load (raw)
channel-type.emsmanager.gridLoadRawW.description = Raw grid power this tick. + = export, − = import.
channel-type.emsmanager.gridLoadSmoothedW.label = Grid load (EWMA smoothed)
channel-type.emsmanager.gridLoadSmoothedW.description = EWMA-smoothed grid load, tau from bridge config.
channel-type.emsmanager.solarLoadW.label = Solar production
channel-type.emsmanager.solarLoadW.description = Raw solar power this tick.
channel-type.emsmanager.houseLoadSumW.label = House consumption
channel-type.emsmanager.houseLoadSumW.description = Raw house power this tick.
channel-type.emsmanager.batteryLoadW.label = Battery flow
channel-type.emsmanager.batteryLoadW.description = Raw battery power this tick. Internal convention: + = charging, − = discharging.
channel-type.emsmanager.batterySoC.label = Battery state of charge
channel-type.emsmanager.batterySoC.description = Battery state-of-charge mirror.
channel-type.emsmanager.batteryReserveTargetPct.label = Battery reserve target (%)
channel-type.emsmanager.batteryReserveTargetPct.description = User-tunable reserve floor. Read-only mirror in phase 1.
channel-type.emsmanager.batteryBelowReserve.label = Battery below reserve
channel-type.emsmanager.batteryBelowReserve.description = ON when SoC < reserve target.
channel-type.emsmanager.availableExcessW.label = Available solar excess
channel-type.emsmanager.availableExcessW.description = Smoothed grid export minus safety margin; 0 when importing.
channel-type.emsmanager.energyMode.label = Energy mode
channel-type.emsmanager.energyMode.description = Derived: SOLAR_EXCESS | BALANCED | GRID_IMPORT | BATTERY_DEPLETING | UNKNOWN.
channel-type.emsmanager.softPeakShavingEcoCapA.label = Soft peak-shaving — ECO cap (A)
channel-type.emsmanager.softPeakShavingEcoCapA.description = Live value of the soft peak-shaving controller's ECO current cap. 32 A normal, 8 A when grid import > 5 kW.
channel-type.emsmanager.breakerHeadroomA.label = Minimum breaker headroom (A)
channel-type.emsmanager.breakerHeadroomA.description = Worst-phase headroom across all cable-connected cars. < 6 A triggers a safety pause request.
channel-type.emsmanager.modbusFresh.label = Meter data fresh
channel-type.emsmanager.modbusFresh.description = ON when the per-car current meters is producing trustworthy amps. OFF triggers the staleness fail-safe.
channel-type.emsmanager.lastDecisionLog.label = Last controller decisions
channel-type.emsmanager.lastDecisionLog.description = Most recent tick's controller decisions, semicolon-separated. (idle) when nothing fired.
channel-type.emsmanager.hardPeakShavingLevel.label = Hard peak-shaving tier
channel-type.emsmanager.hardPeakShavingLevel.description = 0 = idle, 1 = ECO cars paused, 2 = + boiler off, 3 = + airco off.
channel-type.emsmanager.hardPeakShavingStatus.label = Hard peak-shaving status
channel-type.emsmanager.hardPeakShavingStatus.description = Cumulative status of the active tier in Dutch (one-line summary suitable for a widget banner).
channel-type.emsmanager.hardPeakShavingDetail.label = Hard peak-shaving detail
channel-type.emsmanager.hardPeakShavingDetail.description = Longer Dutch explanation of the active tier — what it touched, why, and what is NOT touched (SNEL cars).
channel-type.emsmanager.carReason.label = EV decision reason
channel-type.emsmanager.carReason.description = Human-readable reason (controller + why) for this car's most recent EMS decision — e.g. a capacity-tariff pause or a routine SNEL setpoint.
channel-type.emsmanager.gridLoad5minAvgW.label = Grid load (5-min avg)
channel-type.emsmanager.gridLoad5minAvgW.description = Arithmetic mean of raw grid power over the last 5 minutes. Drives the solar-surplus dispatcher.
channel-type.emsmanager.surplusOnThresholdW.label = Surplus on-threshold
channel-type.emsmanager.surplusOnThresholdW.description = Live boiler-on threshold computed from cloudiness + battery-reserve adjustments.
channel-type.emsmanager.boilerUserOverride.label = Boiler user-override active
channel-type.emsmanager.boilerUserOverride.description = ON when the user has manually toggled the boiler today — surplus dispatcher steps aside until midnight.
channel-type.emsmanager.capMonthlyPeakW.label = Capacity — month-to-date peak
channel-type.emsmanager.capMonthlyPeakW.description = Highest 15-min grid-import average seen so far this month. Reset on month rollover. This is the dimension Belgian capaciteitstarief bills on.
channel-type.emsmanager.capCurrentQuarterW.label = Capacity — current quarter avg
channel-type.emsmanager.capCurrentQuarterW.description = Running average of grid power over the current :00/:15/:30/:45 slot (signed; − = import).
channel-type.emsmanager.capProjectedQuarterW.label = Capacity — projected end-of-quarter
channel-type.emsmanager.capProjectedQuarterW.description = Projected end-of-slot average (v1 = same as current running avg).
channel-type.emsmanager.capWouldExceed.label = Capacity — would exceed monthly peak
channel-type.emsmanager.capWouldExceed.description = ON when the projected end-of-slot average would set a new monthly peak (or push above the 2.5 kW billing floor).
channel-type.emsmanager.capStatus.label = Capacity — status (Dutch)
channel-type.emsmanager.capStatus.description = Human-readable Dutch status describing what the capacity-tariff controller is doing this tick.
channel-type.emsmanager.dmTrackedW.label = Device-meters — tracked W
channel-type.emsmanager.dmTrackedW.description = Sum of currentW across all registered device-meter Things.
channel-type.emsmanager.dmUntrackedW.label = Device-meters — untracked W
channel-type.emsmanager.dmUntrackedW.description = House power − Σ tracked. The "other / unknown" slice.
channel-type.emsmanager.dmTrackedKwhDay.label = Device-meters — tracked kWh today
channel-type.emsmanager.dmTrackedKwhDay.description = Sum of kWh-today across all device-meter Things.
channel-type.emsmanager.optPlanCsv.label = Optimizer — 24h plan
channel-type.emsmanager.optPlanCsv.description = 24-character schedule string: c=charge, d=discharge, .=passive. Hour 0..23 indexed.
channel-type.emsmanager.optNextChargeHour.label = Optimizer — next charge hour
channel-type.emsmanager.optNextChargeHour.description = Hour-of-day (0..23) of the next recommended battery-charge window; -1 if none planned.
channel-type.emsmanager.optNextDischargeHour.label = Optimizer — next discharge hour
channel-type.emsmanager.optNextDischargeHour.description = Hour-of-day (0..23) of the next recommended battery-discharge window; -1 if none planned.

# ============================================================================
# Forecast Thing
# ============================================================================
thing-type.emsmanager.forecast-solar.label = Solar Forecast
thing-type.emsmanager.forecast-solar.description = Pluggable solar production forecast provider (forecast.solar free tier by default).
thing-type.config.emsmanager.forecast-solar.kind.label = Provider kind
thing-type.config.emsmanager.forecast-solar.kind.description = Which forecast provider to use. Currently ships the free tier.
thing-type.config.emsmanager.forecast-solar.apiBaseUrl.label = API base URL
thing-type.config.emsmanager.forecast-solar.apiBaseUrl.description = Override only if testing against a non-default endpoint.
thing-type.config.emsmanager.forecast-solar.apiKey.label = API key (paid tiers)
thing-type.config.emsmanager.forecast-solar.apiKey.description = Not used by the free tier; reserved for forecast-solar-paid + solcast.
thing-type.config.emsmanager.forecast-solar.lat.label = Latitude
thing-type.config.emsmanager.forecast-solar.lat.description = Site latitude in decimal degrees. Required — Thing stays OFFLINE without it.
thing-type.config.emsmanager.forecast-solar.lon.label = Longitude
thing-type.config.emsmanager.forecast-solar.lon.description = Site longitude in decimal degrees. Required.
thing-type.config.emsmanager.forecast-solar.declination.label = Roof tilt (declination, deg)
thing-type.config.emsmanager.forecast-solar.declination.description = 0 = horizontal, 90 = vertical. Typical Flemish roof: 30-40°.
thing-type.config.emsmanager.forecast-solar.azimuth.label = Roof azimuth (deg)
thing-type.config.emsmanager.forecast-solar.azimuth.description = 0 = south, 90 = west, -90 = east, ±180 = north.
thing-type.config.emsmanager.forecast-solar.kwp.label = Peak power (kWp)
thing-type.config.emsmanager.forecast-solar.kwp.description = Installed solar peak power.
thing-type.config.emsmanager.forecast-solar.refreshIntervalMin.label = Refresh interval (min)
thing-type.config.emsmanager.forecast-solar.refreshIntervalMin.description = How often to poll the provider. Default 30 min keeps comfortably under the free-tier 12/h rate limit.
channel-type.emsmanager.fcNowW.label = Forecast — now (W)
channel-type.emsmanager.fcNowW.description = Forecast solar production at this hour.
channel-type.emsmanager.fcNext1hWh.label = Forecast — next 1 h
channel-type.emsmanager.fcNext1hWh.description = Forecast energy production for the next 60 minutes.
channel-type.emsmanager.fcNext3hWh.label = Forecast — next 3 h
channel-type.emsmanager.fcNext6hWh.label = Forecast — next 6 h
channel-type.emsmanager.fcTodayKwh.label = Forecast — today (kWh)
channel-type.emsmanager.fcTodayKwh.description = Forecast total energy production for the current calendar day.
channel-type.emsmanager.fcTomorrowKwh.label = Forecast — tomorrow (kWh)
channel-type.emsmanager.fcTomorrowKwh.description = Forecast total energy production for tomorrow.
channel-type.emsmanager.fcPeakTodayAt.label = Forecast — peak today at
channel-type.emsmanager.fcPeakTodayAt.description = Timestamp of today's projected production peak.
channel-type.emsmanager.fcLastRefreshAt.label = Forecast — last refresh
channel-type.emsmanager.fcRateLimitRemaining.label = Forecast — rate-limit remaining
channel-type.emsmanager.fcRateLimitRemaining.description = API calls remaining in the current rate window (when the provider reports it).
channel-type.emsmanager.fcLastError.label = Forecast — last error
channel-type.emsmanager.fcLastError.description = Most recent fetch error, if any.
channel-type.emsmanager.fcHourlyTodayCsv.label = Forecast — today hourly (CSV)
channel-type.emsmanager.fcHourlyTodayCsv.description = HH:MM=W,HH:MM=W,… for today. Dashboard chart parses this for forecast-vs-actual overlay.

# ============================================================================
# Tariff Thing
# ============================================================================
thing-type.emsmanager.tariff.label = Energy Tariff
thing-type.emsmanager.tariff.description = Pluggable electricity tariff provider — flat, day/night, ToU schedule, or dynamic spot (ENTSO-E / Tibber / CSV).
thing-type.config.emsmanager.tariff.kind.label = Tariff kind
thing-type.config.emsmanager.tariff.kind.description = flat = single fixed rate; day-night = two-rate schedule; tou-schedule = user-defined hourly prices; dynamic-spot = live day-ahead prices from ENTSO-E / Tibber / CSV.
thing-type.config.emsmanager.tariff.subProvider.label = Spot sub-provider (kind=dynamic-spot only)
thing-type.config.emsmanager.tariff.subProvider.description = Which upstream service to fetch from. ENTSO-E = free transparency platform raw day-ahead BE bidding zone. Tibber = end-customer-final prices via your Tibber account (BE supported). CSV = generic file/URL for suppliers without APIs (Engie Dynamic / Bolt / Mega Flow / TotalEnergies).
thing-type.config.emsmanager.tariff.apiKey.label = API key / token
thing-type.config.emsmanager.tariff.apiKey.description = ENTSO-E security token (register free at transparency.entsoe.eu), OR Tibber personal access token (developer.tibber.com). Leave blank for csv-upload.
thing-type.config.emsmanager.tariff.csvUrl.label = CSV URL or local file path
thing-type.config.emsmanager.tariff.csvUrl.description = For subProvider=csv-upload. Either http(s):// URL or absolute filesystem path. Expects 24-48 €/kWh values, one per line, OR "timestamp,price" pairs. Pre-tax prices — markup is added on top.
thing-type.config.emsmanager.tariff.markupEurPerKWh.label = Markup €/kWh (added on top of raw spot)
thing-type.config.emsmanager.tariff.markupEurPerKWh.description = Covers taxes, distribution, supplier margin, green-energy levies. Belgian residential typical: 0.12 €/kWh on top of EPEX spot. SET 0 FOR TIBBER (Tibber prices are end-customer-final).
thing-type.config.emsmanager.tariff.refreshIntervalMin.label = Refresh interval (min)
thing-type.config.emsmanager.tariff.refreshIntervalMin.description = How often to poll the upstream. Day-ahead prices don't change intraday so 60+ minutes is plenty. Lower = more API traffic.
thing-type.config.emsmanager.tariff.flatPriceEurPerKWh.label = Flat price (€/kWh)
thing-type.config.emsmanager.tariff.flatPriceEurPerKWh.description = Used when kind=flat.
thing-type.config.emsmanager.tariff.dayPriceEurPerKWh.label = Day price (€/kWh)
thing-type.config.emsmanager.tariff.dayPriceEurPerKWh.description = Used when kind=day-night.
thing-type.config.emsmanager.tariff.nightPriceEurPerKWh.label = Night price (€/kWh)
thing-type.config.emsmanager.tariff.nightPriceEurPerKWh.description = Used when kind=day-night.
thing-type.config.emsmanager.tariff.dayStartHour.label = Day start hour
thing-type.config.emsmanager.tariff.dayStartHour.description = 0..23, local time. Used when kind=day-night.
thing-type.config.emsmanager.tariff.dayEndHour.label = Day end hour
thing-type.config.emsmanager.tariff.dayEndHour.description = 0..23, local time. Day window is [start, end). Can wrap midnight (e.g. start=22, end=6).
thing-type.config.emsmanager.tariff.hourlyPricesCsv.label = Hourly prices (24, CSV)
thing-type.config.emsmanager.tariff.hourlyPricesCsv.description = Used when kind=tou-schedule. Exactly 24 comma-separated €/kWh values for hours 0..23.
channel-type.emsmanager.trNowPrice.label = Tariff — current price
channel-type.emsmanager.trNowPrice.description = Current €/kWh.
channel-type.emsmanager.trNext1hPrice.label = Tariff — next hour
channel-type.emsmanager.trTodayMinPrice.label = Tariff — today min
channel-type.emsmanager.trTodayMaxPrice.label = Tariff — today max
channel-type.emsmanager.trTodayAvgPrice.label = Tariff — today avg
channel-type.emsmanager.trCheapestHourStart.label = Tariff — cheapest hour starts
channel-type.emsmanager.trMostExpensiveHourStart.label = Tariff — most expensive hour starts
channel-type.emsmanager.trSchedule24hCsv.label = Tariff — schedule today (CSV)
channel-type.emsmanager.trSchedule24hCsv.description = 24 comma-separated €/kWh values for today's hours 0..23. Widget can parse and chart.
channel-type.emsmanager.trSchedule48hCsv.label = Tariff — schedule today+tomorrow (CSV)
channel-type.emsmanager.trSchedule48hCsv.description = 48 comma-separated €/kWh values for today + tomorrow.
channel-type.emsmanager.trLastRefreshAt.label = Tariff — last refresh

# ============================================================================
# Device-meter Thing
# ============================================================================
thing-type.emsmanager.device-meter.label = Device meter
thing-type.emsmanager.device-meter.description = Integrates a power-item into per-device kWh totals (today / yesterday / last-7 / last-30 / year). One Thing per sub-metered load.
thing-type.config.emsmanager.device-meter.name.label = Display name
thing-type.config.emsmanager.device-meter.name.description = Human-friendly label for the UI (e.g. "Boiler", "Auto 1 — Poort", "Verlichting beneden").
thing-type.config.emsmanager.device-meter.powerItem.label = Power item
thing-type.config.emsmanager.device-meter.powerItem.description = Item that reports the device's current draw (W or kW).
thing-type.config.emsmanager.device-meter.powerInKw.label = Power is in kW
thing-type.config.emsmanager.device-meter.powerInKw.description = Set true if the source item reports kW instead of W.
thing-type.config.emsmanager.device-meter.energyItem.label = Cumulative energy item (optional)
thing-type.config.emsmanager.device-meter.energyItem.description = If provided, an absolute kWh item — currently informational; future versions may use Δitem instead of integrating power.
thing-type.config.emsmanager.device-meter.category.label = Category
thing-type.config.emsmanager.device-meter.category.description = UI grouping. heating / lighting / ev / appliance / hvac / other.
thing-type.config.emsmanager.device-meter.color.label = Display color (hex)
thing-type.config.emsmanager.device-meter.color.description = For donut chart wedge / progress bar tint.
channel-type.emsmanager.dmCurrentW.label = Current power
channel-type.emsmanager.dmKwhToday.label = kWh today
channel-type.emsmanager.dmKwhYesterday.label = kWh yesterday
channel-type.emsmanager.dmKwhLast7Days.label = kWh last 7 days
channel-type.emsmanager.dmKwhLast30Days.label = kWh last 30 days
channel-type.emsmanager.dmKwhYear.label = kWh this year
channel-type.emsmanager.dmCategoryChan.label = Category
channel-type.emsmanager.dmColorChan.label = Color

# ============================================================================
# Heat-pump Thing
# ============================================================================
thing-type.emsmanager.heatpump.label = Heat pump
thing-type.emsmanager.heatpump.description = Heat-pump asset for SCOP-aware optimization. Provide a power-item + temp items; the optimizer publishes a recommended mode each tick.
thing-type.config.emsmanager.heatpump.name.label = Display name
thing-type.config.emsmanager.heatpump.powerItem.label = Power item (W)
thing-type.config.emsmanager.heatpump.powerItem.description = Item that reports the pump's current draw in watts.
thing-type.config.emsmanager.heatpump.currentTempItem.label = Current indoor-temp item (°C)
thing-type.config.emsmanager.heatpump.targetTempItem.label = Target indoor-temp item (°C)
thing-type.config.emsmanager.heatpump.modeItem.label = Mode item (read-only echo)
thing-type.config.emsmanager.heatpump.modeItem.description = Item the pump's current mode can be read from. Optional; informational only.
thing-type.config.emsmanager.heatpump.scopCop.label = SCOP (Seasonal CoP)
thing-type.config.emsmanager.heatpump.scopCop.description = Used to compute effective €/kWh-thermal. Typical air-water 3.5–4; geothermal 4.5–5.5.
thing-type.config.emsmanager.heatpump.mode.label = Climate direction
thing-type.config.emsmanager.heatpump.mode.description = heat (default), cool, or auto (follow the unit's mode item across seasons).
thing-type.config.emsmanager.heatpump.heatModeValue.label = Mode value = heating (auto)
thing-type.config.emsmanager.heatpump.heatModeValue.description = For mode=auto: the mode-item numeric value that means heating (e.g. KNX airco 1).
thing-type.config.emsmanager.heatpump.coolModeValue.label = Mode value = cooling (auto)
thing-type.config.emsmanager.heatpump.coolModeValue.description = For mode=auto: the mode-item numeric value that means cooling (e.g. KNX airco 3).
thing-type.config.emsmanager.heatpump.allowBoostOnSurplus.label = Boost on solar surplus
thing-type.config.emsmanager.heatpump.allowDeferOnPeak.label = Defer on tariff peaks
thing-type.config.emsmanager.heatpump.cheapPriceThresholdRatio.label = Cheap-window ratio
thing-type.config.emsmanager.heatpump.cheapPriceThresholdRatio.description = Tariff < dayAvg × this → cheap mode.
thing-type.config.emsmanager.heatpump.expensivePriceThresholdRatio.label = Expensive-window ratio
thing-type.config.emsmanager.heatpump.expensivePriceThresholdRatio.description = Tariff > dayAvg × this → defer mode.
thing-type.config.emsmanager.heatpump.boostSurplusThresholdW.label = Boost surplus threshold (W)
thing-type.config.emsmanager.heatpump.tempDeadbandC.label = Temp deadband (°C)

channel-type.emsmanager.hpRecommendedMode.label = Heat pump — recommended mode
channel-type.emsmanager.hpRecommendedMode.description = One of: OFF / ECO / COMFORT / BOOST.
channel-type.emsmanager.hpReason.label = Heat pump — reason
channel-type.emsmanager.hpEffectivePrice.label = Heat pump — effective price (€/kWh-thermal)
channel-type.emsmanager.hpEffectivePrice.description = Tariff / SCOP.
channel-type.emsmanager.hpDailyKwh.label = Heat pump — daily kWh estimate
channel-type.emsmanager.hpOptimizerActive.label = Heat pump — optimizer active
channel-type.emsmanager.hpOptimizerActive.description = ON when the recommendation differs from passive comfort mode.

