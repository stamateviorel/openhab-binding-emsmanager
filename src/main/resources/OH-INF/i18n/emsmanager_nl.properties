# EMS Manager binding i18n labels (Nederlands).

addon.emsmanager.name = EMS Manager-binding
addon.emsmanager.description = Energiebeheer-coördinator boven de apparaatbindings (KNX, Modbus, OCPP, ...). Controllers met prioriteit, asset-abstractie, voorspellings- / tarief- / capaciteitstarief-ondersteuning, CO₂-tracking, EV-plan, warmtepomp SCOP-optimizer.

# ============================================================================
# Bridge
# ============================================================================
thing-type.emsmanager.bridge.label = EMS Manager
thing-type.emsmanager.bridge.description = Centrale coördinator: scheduler + energie-context per tick + dispatch per controller.

thing-type.config.emsmanager.bridge.tickIntervalSeconds.label = Tick-interval (s)
thing-type.config.emsmanager.bridge.tickIntervalSeconds.description = Hoe vaak de scheduler controllers evalueert.
thing-type.config.emsmanager.bridge.gridSafetyMarginW.label = Net-veiligheidsmarge (W)
thing-type.config.emsmanager.bridge.gridSafetyMarginW.description = Marge gereserveerd voor injectie bij ECO-budgetberekening.
thing-type.config.emsmanager.bridge.gridEwmaTauSec.label = EWMA tijdsconstante (s)
thing-type.config.emsmanager.bridge.gridEwmaTauSec.description = Tijdsconstante voor de afvlakking van het netvermogen.
thing-type.config.emsmanager.bridge.shadowMode.label = Schaduw-modus (master)
thing-type.config.emsmanager.bridge.shadowMode.description = Indien AAN, rekenen controllers maar schrijven niet. Hoofd-killswitch.
thing-type.config.emsmanager.bridge.batteryControlMode.label = Batterij-besturingsmodus
thing-type.config.emsmanager.bridge.batteryControlMode.description = auto = EMS schrijft setpoints naar batterySetpointItemName; fixed = vaste door gebruiker ingestelde waarde (BatteryTouDispatcher inactief); readonly = omvormer niet beschrijfbaar (standaard).
thing-type.config.emsmanager.bridge.batterySetpointItemName.label = Batterij-setpoint item (auto-modus)
thing-type.config.emsmanager.bridge.batterySetpointItemName.description = Item waarnaar de binding schrijft in batteryControlMode=auto. Laat leeg bij readonly/fixed.
thing-type.config.emsmanager.bridge.batteryFixedSetpointW.label = Vast setpoint (W, fixed-modus)
thing-type.config.emsmanager.bridge.batteryFixedSetpointW.description = Gebruikt bij batteryControlMode=fixed. Met teken: + = ontladen, − = laden.
thing-type.config.emsmanager.bridge.batteryMinSetpointW.label = Batterij min-setpoint (W)
thing-type.config.emsmanager.bridge.batteryMinSetpointW.description = Ondergrens in auto-modus. − = maximaal laden vanaf het net.
thing-type.config.emsmanager.bridge.batteryMaxSetpointW.label = Batterij max-setpoint (W)
thing-type.config.emsmanager.bridge.batteryMaxSetpointW.description = Bovengrens in auto-modus. + = maximaal ontladen.
thing-type.config.emsmanager.bridge.injectionPriceEurPerKWh.label = Injectieprijs (€/kWh)
thing-type.config.emsmanager.bridge.injectionPriceEurPerKWh.description = Prijs die je krijgt voor geïnjecteerde kWh. Gebruikt door CostAnalyticsController.
thing-type.config.emsmanager.bridge.boilerForceOnSchedule.label = Boiler geforceerde aan-rooster
thing-type.config.emsmanager.bridge.boilerForceOnSchedule.description = CSV van dag:HH:MM-HH:MM-vensters (MON TUE WED THU FRI SAT SUN). Leeg = uit.
thing-type.config.emsmanager.bridge.gridLoadItem.label = Net-belasting item
thing-type.config.emsmanager.bridge.solarLoadItem.label = Zon-belasting item
thing-type.config.emsmanager.bridge.houseLoadSumItem.label = Huisbelasting item
thing-type.config.emsmanager.bridge.batteryLoadItem.label = Batterij-belasting item
thing-type.config.emsmanager.bridge.batteryPercentageItem.label = Batterij-percentage item
thing-type.config.emsmanager.bridge.batteryReserveTargetItem.label = Batterij-reserve doel item
thing-type.config.emsmanager.bridge.gridImportPositive.label = Net-item is afname-positief
thing-type.config.emsmanager.bridge.gridImportPositive.description = Inschakelen als je net-item + = afname rapporteert (bv. Fronius). De interne conventie van de binding is + = injectie; de meting wordt eenmalig genegeerd in teken wanneer dit aanstaat.
thing-type.config.emsmanager.bridge.batteryChargePositive.label = Batterij-item is laad-positief
thing-type.config.emsmanager.bridge.batteryChargePositive.description = Of je batterij-vermogen-item + = laden rapporteert (de conventie van de binding). Uitschakelen als je item + = ontladen gebruikt.
thing-type.config.emsmanager.bridge.carCount.label = Aantal wagens
thing-type.config.emsmanager.bridge.carModeItemPattern.label = Wagen-modus item-patroon
thing-type.config.emsmanager.bridge.carCableItemPattern.label = Wagen-kabel item-patroon
thing-type.config.emsmanager.bridge.carStatusItemPattern.label = Wagen-status item-patroon
thing-type.config.emsmanager.bridge.carCurrentLimitItemPattern.label = Wagen-stroomlimiet item-patroon
thing-type.config.emsmanager.bridge.carPauseItemPattern.label = Wagen-pauze item-patroon
thing-type.config.emsmanager.bridge.carChargingItemPattern.label = Wagen-laad item-patroon
thing-type.config.emsmanager.bridge.carPowerOcppItemPattern.label = Wagen OCPP-vermogen item-patroon (W)
thing-type.config.emsmanager.bridge.carPowerKwItemPattern.label = Wagen vermogen (kW) item-patroon
thing-type.config.emsmanager.bridge.carAmpsL1ItemPattern.label = Wagen ampère L1 item-patroon
thing-type.config.emsmanager.bridge.carAmpsL2ItemPattern.label = Wagen ampère L2 item-patroon
thing-type.config.emsmanager.bridge.carAmpsL3ItemPattern.label = Wagen ampère L3 item-patroon
thing-type.config.emsmanager.bridge.statisticsRollupEnabled.label = Statistieken-rollup
thing-type.config.emsmanager.bridge.statisticsRollupEnabled.description = Snapshot van afgesloten dagtotalen naar nette EMS_Stat_*-items elke dag om 23:58, zodat maand-/jaargrafieken snel blijven. Schakel alleen uit als je geen energie over lange termijn grafiekt.
thing-type.config.emsmanager.bridge.boilerStateItem.label = Boiler-status item
thing-type.config.emsmanager.bridge.boilerStateItem.description = Switch-item dat de werkelijke aan/uit-status van de boiler weergeeft (lezen).
thing-type.config.emsmanager.bridge.aircoGroupItem.label = Airco-groep item
thing-type.config.emsmanager.bridge.aircoGroupItem.description = Switch-/groep-item dat aangeeft of de airco vermogen trekt (lezen).
thing-type.config.emsmanager.bridge.peakShavingEnabledItem.label = Peak-shaving ingeschakeld item
thing-type.config.emsmanager.bridge.peakShavingEnabledItem.description = Switch-item dat als hoofdschakelaar voor peak-shaving dient. Ontbrekend/UNDEF wordt als ingeschakeld behandeld.
thing-type.config.emsmanager.bridge.weatherCloudinessItem.label = Weer-bewolking item
thing-type.config.emsmanager.bridge.weatherCloudinessItem.description = Number-item met het voorspelde bewolkingspercentage van vandaag (lezen).
thing-type.config.emsmanager.bridge.boilerUserOverrideItem.label = Boiler gebruiker-override item
thing-type.config.emsmanager.bridge.boilerUserOverrideItem.description = Switch-item waarmee de gebruiker de boiler kan forceren, met voorrang op zon-/tariefplanning (lezen).
thing-type.config.emsmanager.bridge.publishLegacyMirrorItems.label = Publiceer legacy spiegel-items
thing-type.config.emsmanager.bridge.publishLegacyMirrorItems.description = Publiceer de legacy spiegel-items (PeakShaving_Level/Status/Detail, PeakShaving_EcoCap_A, Available_excess_W, EnergyOrchestrator_Mode, Battery_below_reserve) voor bestaande widgets. Laat uit bij een verse installatie; de eigen channels van de binding dragen deze data.
thing-type.config.emsmanager.bridge.capacityMinBillableW.label = Capaciteitstarief minimum factureerbare vraag
thing-type.config.emsmanager.bridge.capacityMinBillableW.description = Minimale factureerbare vraag voor een capaciteitstarief (België factureert minimum 2500 W). Onder deze drempel heeft afvlakken geen zin. Zet op 0 in markten zonder capaciteitstarief.
thing-type.config.emsmanager.bridge.gridCo2GramsPerKWh.label = Net CO₂ (g/kWh geleverd)
thing-type.config.emsmanager.bridge.gridCo2GramsPerKWh.description = CO₂-intensiteit van het nationale net. België residentieel ≈ 140 g/kWh.
thing-type.config.emsmanager.bridge.injectionCo2OffsetGramsPerKWh.label = Vermeden CO₂ bij injectie (g/kWh)
thing-type.config.emsmanager.bridge.injectionCo2OffsetGramsPerKWh.description = Marginale opwekking die je injectie vervangt. Belgische gas-piek ≈ 350 g/kWh.

# Bridge channels
channel-type.emsmanager.shadowMode.label = Schaduw-modus (actief)
channel-type.emsmanager.shadowMode.description = Live-uitlezing van de schaduw-modus van de bridge. AAN = er worden geen waarden geschreven.
channel-type.emsmanager.lastTickAt.label = Laatste tick op
channel-type.emsmanager.lastTickAt.description = Tijdstip van de meest recente scheduler-tick.
channel-type.emsmanager.tickCount.label = Tick-teller
channel-type.emsmanager.tickCount.description = Aantal scheduler-ticks sinds de initialisatie van de bridge.
channel-type.emsmanager.controllerCount.label = Geregistreerde controllers
channel-type.emsmanager.controllerCount.description = Aantal controllers dat momenteel bij de scheduler is geregistreerd.
channel-type.emsmanager.gridLoadRawW.label = Net-belasting (ruw)
channel-type.emsmanager.gridLoadRawW.description = Ruw netvermogen deze tick. + = injectie, − = afname.
channel-type.emsmanager.gridLoadSmoothedW.label = Net-belasting (EWMA-afgevlakt)
channel-type.emsmanager.gridLoadSmoothedW.description = EWMA-afgevlakte net-belasting, tau uit de bridge-config.
channel-type.emsmanager.solarLoadW.label = Zonproductie
channel-type.emsmanager.solarLoadW.description = Ruw zonnevermogen deze tick.
channel-type.emsmanager.houseLoadSumW.label = Huisverbruik
channel-type.emsmanager.houseLoadSumW.description = Ruw huisvermogen deze tick.
channel-type.emsmanager.batteryLoadW.label = Batterij-flow
channel-type.emsmanager.batteryLoadW.description = Ruw batterijvermogen deze tick. Interne conventie: + = laden, − = ontladen.
channel-type.emsmanager.batterySoC.label = Batterij-laadtoestand
channel-type.emsmanager.batterySoC.description = Spiegel van batterijlaadtoestand.
channel-type.emsmanager.batteryReserveTargetPct.label = Batterij-reserve doel (%)
channel-type.emsmanager.batteryReserveTargetPct.description = Door gebruiker instelbare reserve-ondergrens. Alleen-lezen spiegel in fase 1.
channel-type.emsmanager.batteryBelowReserve.label = Batterij onder reserve
channel-type.emsmanager.batteryBelowReserve.description = AAN wanneer SoC < reserve-doel.
channel-type.emsmanager.availableExcessW.label = Beschikbaar zon-overschot
channel-type.emsmanager.availableExcessW.description = Afgevlakte net-injectie minus veiligheidsmarge; 0 bij afname.
channel-type.emsmanager.energyMode.label = Energie-modus
channel-type.emsmanager.energyMode.description = Afgeleid: SOLAR_EXCESS | BALANCED | GRID_IMPORT | BATTERY_DEPLETING | UNKNOWN.
channel-type.emsmanager.softPeakShavingEcoCapA.label = Zachte peak-shaving — ECO-cap (A)
channel-type.emsmanager.softPeakShavingEcoCapA.description = Live-waarde van de ECO-stroomcap van de zachte peak-shaving-controller. 32 A normaal, 8 A bij net-afname > 5 kW.
channel-type.emsmanager.breakerHeadroomA.label = Minimale zekering-marge (A)
channel-type.emsmanager.breakerHeadroomA.description = Slechtste-fase marge over alle wagens met kabel aangesloten. < 6 A vraagt een veiligheidspauze aan.
channel-type.emsmanager.modbusFresh.label = Meter-data vers
channel-type.emsmanager.modbusFresh.description = AAN wanneer de stroommeters per wagen betrouwbare ampères levert. UIT activeert de veiligheid bij verouderde data.
channel-type.emsmanager.lastDecisionLog.label = Laatste controller-beslissingen
channel-type.emsmanager.lastDecisionLog.description = Beslissingen van de controllers van de meest recente tick, gescheiden door puntkomma's. (idle) wanneer niets afging.
channel-type.emsmanager.hardPeakShavingLevel.label = Harde peak-shaving niveau
channel-type.emsmanager.hardPeakShavingLevel.description = 0 = idle, 1 = ECO-wagens gepauzeerd, 2 = + boiler uit, 3 = + airco uit.
channel-type.emsmanager.hardPeakShavingStatus.label = Harde peak-shaving status
channel-type.emsmanager.hardPeakShavingStatus.description = Cumulatieve status van het actieve niveau in het Nederlands (één-regelige samenvatting geschikt voor een widget-banner).
channel-type.emsmanager.hardPeakShavingDetail.label = Harde peak-shaving detail
channel-type.emsmanager.hardPeakShavingDetail.description = Langere Nederlandse uitleg van het actieve niveau — wat het raakte, waarom, en wat NIET geraakt wordt (SNEL-wagens).
channel-type.emsmanager.gridLoad5minAvgW.label = Net-belasting (5-min gem.)
channel-type.emsmanager.gridLoad5minAvgW.description = Rekenkundig gemiddelde van ruw netvermogen over de laatste 5 minuten. Stuurt de zon-overschot-dispatcher.
channel-type.emsmanager.surplusOnThresholdW.label = Overschot aan-drempel
channel-type.emsmanager.surplusOnThresholdW.description = Live boiler-aan drempel berekend uit bewolkings- + batterijreserve-aanpassingen.
channel-type.emsmanager.boilerUserOverride.label = Boiler gebruiker-override actief
channel-type.emsmanager.boilerUserOverride.description = AAN wanneer de gebruiker de boiler vandaag handmatig schakelde — de overschot-dispatcher stapt opzij tot middernacht.
channel-type.emsmanager.capMonthlyPeakW.label = Capaciteit — piek deze maand
channel-type.emsmanager.capMonthlyPeakW.description = Hoogste 15-min net-afname gemiddelde tot nu toe deze maand. Reset bij maandwissel. Dit is de dimensie waarop het Belgische capaciteitstarief factureert.
channel-type.emsmanager.capCurrentQuarterW.label = Capaciteit — huidig kwartier gem.
channel-type.emsmanager.capCurrentQuarterW.description = Lopend gemiddelde van netvermogen over het huidige :00/:15/:30/:45-slot (met teken; − = afname).
channel-type.emsmanager.capProjectedQuarterW.label = Capaciteit — verwacht einde-kwartier
channel-type.emsmanager.capProjectedQuarterW.description = Verwacht einde-slot gemiddelde (v1 = gelijk aan huidig lopend gemiddelde).
channel-type.emsmanager.capWouldExceed.label = Capaciteit — zou maandpiek overschrijden
channel-type.emsmanager.capWouldExceed.description = AAN wanneer het verwachte einde-slot gemiddelde een nieuwe maandpiek zou zetten (of boven de 2,5 kW facturatiedrempel zou duwen).
channel-type.emsmanager.capStatus.label = Capaciteit — status (Nederlands)
channel-type.emsmanager.capStatus.description = Leesbare Nederlandse status die beschrijft wat de capaciteitstarief-controller deze tick doet.
channel-type.emsmanager.dmTrackedW.label = Apparaat-meters — gevolgd W
channel-type.emsmanager.dmTrackedW.description = Som van currentW over alle geregistreerde apparaat-meter Things.
channel-type.emsmanager.dmUntrackedW.label = Apparaat-meters — niet-gevolgd W
channel-type.emsmanager.dmUntrackedW.description = Huisvermogen − Σ gevolgd. Het "overig / onbekend" deel.
channel-type.emsmanager.dmTrackedKwhDay.label = Apparaat-meters — gevolgd kWh vandaag
channel-type.emsmanager.dmTrackedKwhDay.description = Som van kWh-vandaag over alle apparaat-meter Things.
channel-type.emsmanager.optPlanCsv.label = Optimizer — 24u-plan
channel-type.emsmanager.optPlanCsv.description = 24-teken schema-string: c=laden, d=ontladen, .=passief. Geïndexeerd op uur 0..23.
channel-type.emsmanager.optNextChargeHour.label = Optimizer — volgend laad-uur
channel-type.emsmanager.optNextChargeHour.description = Uur-van-de-dag (0..23) van het volgende aanbevolen batterij-laadvenster; -1 als er geen gepland is.
channel-type.emsmanager.optNextDischargeHour.label = Optimizer — volgend ontlaad-uur
channel-type.emsmanager.optNextDischargeHour.description = Uur-van-de-dag (0..23) van het volgende aanbevolen batterij-ontlaadvenster; -1 als er geen gepland is.

# ============================================================================
# Forecast Thing
# ============================================================================
thing-type.emsmanager.forecast-solar.label = Zonprognose
thing-type.emsmanager.forecast-solar.description = Pluggable provider voor zonproductievoorspelling (forecast.solar free tier standaard).
thing-type.config.emsmanager.forecast-solar.kind.label = Provider-soort
thing-type.config.emsmanager.forecast-solar.kind.description = Welke voorspellingsprovider gebruikt wordt. Fase 7 levert enkel de free tier.
thing-type.config.emsmanager.forecast-solar.apiBaseUrl.label = API basis-URL
thing-type.config.emsmanager.forecast-solar.apiBaseUrl.description = Enkel overschrijven bij testen tegen een niet-standaard endpoint.
thing-type.config.emsmanager.forecast-solar.apiKey.label = API-sleutel (betaalde tiers)
thing-type.config.emsmanager.forecast-solar.apiKey.description = Niet gebruikt door de free tier; gereserveerd voor forecast-solar-paid + solcast.
thing-type.config.emsmanager.forecast-solar.lat.label = Breedtegraad
thing-type.config.emsmanager.forecast-solar.lat.description = Site-breedtegraad in decimale graden. Verplicht — Thing blijft OFFLINE zonder.
thing-type.config.emsmanager.forecast-solar.lon.label = Lengtegraad
thing-type.config.emsmanager.forecast-solar.lon.description = Site-lengtegraad in decimale graden. Verplicht.
thing-type.config.emsmanager.forecast-solar.declination.label = Dakhelling (declinatie, graden)
thing-type.config.emsmanager.forecast-solar.declination.description = 0 = horizontaal, 90 = verticaal. Typisch Vlaams dak: 30-40°.
thing-type.config.emsmanager.forecast-solar.azimuth.label = Dak-azimut (graden)
thing-type.config.emsmanager.forecast-solar.azimuth.description = 0 = zuid, 90 = west, -90 = oost, ±180 = noord.
thing-type.config.emsmanager.forecast-solar.kwp.label = Piekvermogen (kWp)
thing-type.config.emsmanager.forecast-solar.kwp.description = Geïnstalleerd zon-piekvermogen.
thing-type.config.emsmanager.forecast-solar.refreshIntervalMin.label = Verversingsinterval (min)
thing-type.config.emsmanager.forecast-solar.refreshIntervalMin.description = Hoe vaak de provider gepolld wordt. Standaard 30 min blijft comfortabel onder de free-tier limiet van 12/u.
channel-type.emsmanager.fcNowW.label = Voorspelling — nu (W)
channel-type.emsmanager.fcNowW.description = Voorspelde zonproductie dit uur.
channel-type.emsmanager.fcNext1hWh.label = Voorspelling — volgende 1 u
channel-type.emsmanager.fcNext1hWh.description = Voorspelde energieproductie voor de komende 60 minuten.
channel-type.emsmanager.fcNext3hWh.label = Voorspelling — volgende 3 u
channel-type.emsmanager.fcNext6hWh.label = Voorspelling — volgende 6 u
channel-type.emsmanager.fcTodayKwh.label = Voorspelling — vandaag (kWh)
channel-type.emsmanager.fcTodayKwh.description = Voorspelde totale energieproductie voor de huidige kalenderdag.
channel-type.emsmanager.fcTomorrowKwh.label = Voorspelling — morgen (kWh)
channel-type.emsmanager.fcTomorrowKwh.description = Voorspelde totale energieproductie voor morgen.
channel-type.emsmanager.fcPeakTodayAt.label = Voorspelling — piek vandaag om
channel-type.emsmanager.fcPeakTodayAt.description = Tijdstip van de voorspelde productiepiek van vandaag.
channel-type.emsmanager.fcLastRefreshAt.label = Voorspelling — laatste verversing
channel-type.emsmanager.fcRateLimitRemaining.label = Voorspelling — rate-limit resterend
channel-type.emsmanager.fcRateLimitRemaining.description = Resterende API-oproepen in het huidige rate-venster (wanneer de provider dit rapporteert).
channel-type.emsmanager.fcLastError.label = Voorspelling — laatste fout
channel-type.emsmanager.fcLastError.description = Meest recente ophaalfout, indien aanwezig.
channel-type.emsmanager.fcHourlyTodayCsv.label = Voorspelling — vandaag per uur (CSV)
channel-type.emsmanager.fcHourlyTodayCsv.description = HH:MM=W,HH:MM=W,… voor vandaag. Dashboard-grafiek parseert dit voor voorspelling-vs-werkelijk overlay.

# ============================================================================
# Tariff Thing
# ============================================================================
thing-type.emsmanager.tariff.label = Energietarief
thing-type.emsmanager.tariff.description = Pluggable elektriciteitstarief-provider — vast, dag/nacht, ToU-schema of dynamisch spot (ENTSO-E / Tibber / CSV).
thing-type.config.emsmanager.tariff.kind.label = Tarief-soort
thing-type.config.emsmanager.tariff.kind.description = flat = enkel vast tarief; day-night = twee-tarief schema; tou-schedule = door gebruiker gedefinieerde uurprijzen; dynamic-spot = live day-ahead prijzen van ENTSO-E / Tibber / CSV.
thing-type.config.emsmanager.tariff.subProvider.label = Spot sub-provider (enkel kind=dynamic-spot)
thing-type.config.emsmanager.tariff.subProvider.description = Welke upstream-dienst opgehaald wordt. ENTSO-E = gratis transparency-platform, ruwe day-ahead BE-biedzone. Tibber = eindklant-finale prijzen via je Tibber-account (BE ondersteund). CSV = generiek bestand/URL voor leveranciers zonder API's (Engie Dynamic / Bolt / Mega Flow / TotalEnergies).
thing-type.config.emsmanager.tariff.apiKey.label = API-sleutel / token
thing-type.config.emsmanager.tariff.apiKey.description = ENTSO-E security-token (gratis registreren op transparency.entsoe.eu), OF Tibber persoonlijke toegangstoken (developer.tibber.com). Laat leeg voor csv-upload.
thing-type.config.emsmanager.tariff.csvUrl.label = CSV-URL of lokaal bestandspad
thing-type.config.emsmanager.tariff.csvUrl.description = Voor subProvider=csv-upload. Ofwel http(s):// URL ofwel absoluut bestandspad. Verwacht 24-48 €/kWh-waarden, één per regel, OF "tijdstempel,prijs"-paren. Prijzen vóór belasting — markup wordt erbovenop opgeteld.
thing-type.config.emsmanager.tariff.markupEurPerKWh.label = Markup €/kWh (bovenop ruwe spot)
thing-type.config.emsmanager.tariff.markupEurPerKWh.description = Dekt belastingen, distributie, leveranciersmarge, groene-energieheffingen. België residentieel typisch: 0,12 €/kWh bovenop EPEX-spot. ZET OP 0 VOOR TIBBER (Tibber-prijzen zijn eindklant-finaal).
thing-type.config.emsmanager.tariff.refreshIntervalMin.label = Verversingsinterval (min)
thing-type.config.emsmanager.tariff.refreshIntervalMin.description = Hoe vaak de upstream gepolld wordt. Day-ahead prijzen wijzigen niet binnen de dag, dus 60+ minuten is ruim voldoende. Lager = meer API-verkeer.
thing-type.config.emsmanager.tariff.flatPriceEurPerKWh.label = Vaste prijs (€/kWh)
thing-type.config.emsmanager.tariff.flatPriceEurPerKWh.description = Gebruikt bij kind=flat.
thing-type.config.emsmanager.tariff.dayPriceEurPerKWh.label = Dagprijs (€/kWh)
thing-type.config.emsmanager.tariff.dayPriceEurPerKWh.description = Gebruikt bij kind=day-night.
thing-type.config.emsmanager.tariff.nightPriceEurPerKWh.label = Nachtprijs (€/kWh)
thing-type.config.emsmanager.tariff.nightPriceEurPerKWh.description = Gebruikt bij kind=day-night.
thing-type.config.emsmanager.tariff.dayStartHour.label = Dag-startuur
thing-type.config.emsmanager.tariff.dayStartHour.description = 0..23, lokale tijd. Gebruikt bij kind=day-night.
thing-type.config.emsmanager.tariff.dayEndHour.label = Dag-einduur
thing-type.config.emsmanager.tariff.dayEndHour.description = 0..23, lokale tijd. Dagvenster is [start, einde). Kan middernacht overlappen (bv. start=22, einde=6).
thing-type.config.emsmanager.tariff.hourlyPricesCsv.label = Uurprijzen (24, CSV)
thing-type.config.emsmanager.tariff.hourlyPricesCsv.description = Gebruikt bij kind=tou-schedule. Precies 24 door komma's gescheiden €/kWh-waarden voor uren 0..23.
channel-type.emsmanager.trNowPrice.label = Tarief — huidige prijs
channel-type.emsmanager.trNowPrice.description = Huidige €/kWh.
channel-type.emsmanager.trNext1hPrice.label = Tarief — volgend uur
channel-type.emsmanager.trTodayMinPrice.label = Tarief — vandaag min
channel-type.emsmanager.trTodayMaxPrice.label = Tarief — vandaag max
channel-type.emsmanager.trTodayAvgPrice.label = Tarief — vandaag gem.
channel-type.emsmanager.trCheapestHourStart.label = Tarief — goedkoopste uur start
channel-type.emsmanager.trMostExpensiveHourStart.label = Tarief — duurste uur start
channel-type.emsmanager.trSchedule24hCsv.label = Tarief — schema vandaag (CSV)
channel-type.emsmanager.trSchedule24hCsv.description = 24 door komma's gescheiden €/kWh-waarden voor de uren 0..23 van vandaag. Widget kan parseren en grafiekken.
channel-type.emsmanager.trSchedule48hCsv.label = Tarief — schema vandaag+morgen (CSV)
channel-type.emsmanager.trSchedule48hCsv.description = 48 door komma's gescheiden €/kWh-waarden voor vandaag + morgen.
