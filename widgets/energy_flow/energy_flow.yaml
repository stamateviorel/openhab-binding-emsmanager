uid: energy_flow
tags:
- energy
- power
- solar
- flow
- sankey
props:
  parameterGroups:
  - name: sources
    label: Sources / inverter
  - name: loads
    label: Consumers
  - name: tuning
    label: Conventions & scaling
  parameters:
  - name: name
    label: Subtitle (top-right)
    type: TEXT
    groupName: ''
    default: ''
    description: Optional subtitle shown in the header. Leave empty for none.
  - name: generatorGroup
    label: Generators group
    type: TEXT
    context: item
    groupName: sources
    description: Group whose members are generation sources (PV, wind, genset). Each member appears as a left-side inflow.
  - name: gridItem
    label: Grid power item
    type: TEXT
    context: item
    groupName: sources
    description: Grid power. Positive = export by default (toggle below).
  - name: gridLabel
    label: Grid label
    type: TEXT
    groupName: sources
    default: Grid
    description: Short name shown on the grid flow.
  - name: batteryItem
    label: Battery power item
    type: TEXT
    context: item
    groupName: sources
    description: Battery power. Positive = charging by default (toggle below).
  - name: batterySocItem
    label: Battery SoC % item
    type: TEXT
    context: item
    groupName: sources
    description: Optional. State-of-charge % — shown as a chip + on the battery flow.
  - name: batteryLabel
    label: Battery label
    type: TEXT
    groupName: sources
    default: Battery
    description: Short name shown on the battery flow.
  - name: houseItem
    label: Total consumption item
    type: TEXT
    context: item
    groupName: sources
    description: Total building/house power — shown in the glowing centre.
  - name: centerLabel
    label: Centre caption
    type: TEXT
    groupName: sources
    default: Usage
    description: Caption under the centre value (rendered upper-case).
  - name: consumerGroup
    label: Consumers group
    type: TEXT
    context: item
    groupName: loads
    description: Group whose members are loads. Each member appears as a right-side outflow (auto colour + keyword icon).
  - name: consumerDivisor
    label: Consumer item -> kW divisor (W=1000, kW=1)
    type: DECIMAL
    groupName: loads
    default: 1000
  - name: powerDivisor
    label: Source item -> kW divisor (W=1000, kW=1)
    type: DECIMAL
    groupName: tuning
    default: 1000
  - name: gridExportPositive
    label: 'Grid sign: positive = EXPORT'
    type: BOOLEAN
    groupName: tuning
    default: true
  - name: batteryChargePositive
    label: 'Battery sign: positive = CHARGING'
    type: BOOLEAN
    groupName: tuning
    default: true
timestamp: Jun 1, 2026, 5:00:00 AM
component: f7-block
config:
  style:
